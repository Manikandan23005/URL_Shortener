{% extends "base.html" %}
{% block title %}Sign Up - CareShort{% endblock %}

{% block content %}
<div class="analytics-header" style="max-width: 500px; margin: 0 auto 2rem;">
    <h2>🚀 Create an Account</h2>
    <p>Join today to start shortening links and tracking your global audience.</p>
</div>

<form action="{{ url_for('signup') }}" method="post" style="max-width: 500px; margin: 0 auto;">
    <input type="text" name="username" placeholder="🤵 Username" required="required">
    <input type="email" name="email" placeholder="📧 Email Address" required="required">
    <input type="password" name="password" placeholder="🔑 Password" required="required">
    <button type="submit" style="margin-top: 10px;">Sign Up Now</button>
    <div class="links" style="text-align: center; margin-top: 1.5rem;">
        <p>Already have an account? <a href="{{ url_for('login') }}" style="font-weight: 600;">Login</a></p>
    </div>
</form>
{% endblock %}
