{% extends "base.html" %}
{% block title %}Login - CareShort{% endblock %}

{% block content %}
<div class="analytics-header" style="max-width: 500px; margin: 0 auto 2rem;">
    <h2>🔐 Welcome Back</h2>
    <p>Sign in to manage your shortened links and tracking analytics.</p>
</div>

<form action="{{ url_for('login') }}" method="post" style="max-width: 500px; margin: 0 auto;">
    <input type="text" name="username" placeholder="🤵 Username" required="required">
    <input type="password" name="password" placeholder="🔑 Password" required="required">
    <button type="submit" style="margin-top: 10px;">Login securely</button>
    <div class="links" style="text-align: center; margin-top: 1.5rem;">
        <p>Don't have an account? <a href="{{ url_for('signup') }}" style="font-weight: 600;">Sign Up</a></p>
    </div>
</form>
{% endblock %}
